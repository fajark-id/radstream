<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadStream - Radio Indonesia</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        .radio-card { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-top: 20px; }
        button { background: #1db954; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>RadStream 📻</h1>
    <p>Daftar Radio Online Indonesia</p>

    <div id="daftar-radio">
        <p>Memuat radio...</p>
    </div>
</div>

<script>
    // Mengambil data dari indonesia.json
    fetch('indonesia.json')
        .then(response => response.json())
        .then(data => {
            const wadah = document.getElementById('daftar-radio');
            wadah.innerHTML = ''; // Kosongkan tulisan "Memuat radio..."

            // Munculkan setiap radio yang ada di JSON
            data.forEach(radio => {
                wadah.innerHTML += `
                    <div class="radio-card">
                        <h3>${radio.name}</h3>
                        <p>${radio.city}, ${radio.province}</p>
                        <audio controls src="${radio.stream_url}"></audio>
                    </div>
                `;
            });
        })
        .catch(err => {
            document.getElementById('daftar-radio').innerHTML = '<p style="color:red;">Gagal memuat radio.</p>';
        });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RadStream</title>
    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }
        
        html, body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }
        
        body.player-active {
            overflow: hidden;
            position: fixed;
        }

        .phone-container { 
            width: 100%; 
            max-width: 390px; 
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            padding: 20px;
            box-sizing: border-box;
        }

        .header-title { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 10px 0 20px 0; 
            letter-spacing: -0.5px; 
        }
        
        .station-list-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 140px;
            -webkit-overflow-scrolling: touch;
        }

        .station-list-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 5px 0; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }

        .station-item { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #2d3748; 
        }

        .station-item:last-child { border-bottom: none; }
        
        .station-img { 
            width: 55px; 
            height: 55px; 
            border-radius: 12px; 
            object-fit: scale-down; 
            background: white; 
            padding: 4px; 
            box-sizing: border-box;
        }

        .station-info { margin-left: 15px; flex: 1; overflow: hidden; }
        .station-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-meta { font-size: 13px; color: var(--text-muted); }

        #mini-player {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            box-sizing: border-box;
            z-index: 80;
            transition: transform 0.3s ease, opacity 0.3s ease;
            border: 1px solid #2d3748;
        }

        #mini-player.hidden {
            transform: translate(-50%, 150%);
            opacity: 0;
            pointer-events: none;
        }

        #mini-player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            cursor: pointer;
            overflow: hidden;
        }

        #mini-logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            object-fit: scale-down;
            background: white;
            padding: 3px;
            box-sizing: border-box;
        }

        .mini-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #mini-station-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-subtitle {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
        }

        #mini-playpause-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-nav { 
            position: fixed; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 100%; 
            max-width: 390px; 
            background: var(--bg-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box; 
            border-top: 1px solid #1e293b; 
            z-index: 90; 
        }

        .footer-text { font-size: 15px; font-weight: 500; color: var(--text-muted); }
        .icon-btn { background: none; border: none; padding: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .player-view { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: var(--bg-color); 
            z-index: 100; 
            padding: 25px; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow: hidden; 
        }

        .player-card { background: var(--card-bg); border-radius: 24px; width: 100%; max-width: 340px; padding: 25px; box-sizing: border-box; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .player-img { width: 100%; aspect-ratio: 1; border-radius: 16px; object-fit: scale-down; background: white; padding: 15px; box-sizing: border-box; margin-bottom: 25px; cursor: pointer; }
        .player-title { font-size: 22px; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 25px; }
        
        .volume-container { display: flex; align-items: center; gap: 12px; width: 100%; margin-bottom: 35px; }
        .volume-slider { 
            flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none;
            background: linear-gradient(to right, var(--text-main) 0%, var(--text-main) 100%, #475569 100%, #475569 100%);
        }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text-main); cursor: pointer; border: none; }
        
        .player-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 10px; box-sizing: border-box; }
        
        .play-master-btn { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            border: 2.5px solid var(--text-main); 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            background: transparent; 
            transition: transform 0.1s;
            color: var(--text-main);
            font-size: 24px; 
            line-height: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .play-master-btn:active { transform: scale(0.95); }
        
        svg { fill: currentColor; color: var(--text-main); }
        .svg-muted { color: var(--text-muted); }

        /* MODAL METADATA STYLE */
        #metadata-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center; }
        .modal-content { background:#1e293b; padding:25px; border-radius:20px; text-align:center; color:white; width:80%; max-width:300px; }
    </style>
</head>
<body>

<div class="phone-container" id="main-view">
    <div class="header-title">Indonesia Station</div>
    
    <div class="station-list-container">
        <div class="station-list-card" id="list-wadah"></div>
    </div>

    <div id="mini-player" class="hidden">
        <div id="mini-player-info" onclick="openFullPlayerFromMini()">
            <img id="mini-logo" src="" alt="Logo Station">
            <div class="mini-text">
                <span id="mini-station-name">Nama Stasiun</span>
                <span class="mini-subtitle">Sedang diputar</span>
            </div>
        </div>
        <button id="mini-playpause-btn" onclick="togglePlay(event)">❚❚</button>
    </div>

    <div class="footer-nav">
        <span class="footer-text">Indonesia Station</span>
        <button class="icon-btn" onclick="alert('Fitur Cari akan aktif di Step berikutnya!')">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
    </div>
</div>

<div id="metadata-modal" onclick="document.getElementById('metadata-modal').style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="modal-cover" src="https://via.placeholder.com/150" style="width:150px; height:150px; border-radius:10px; margin-bottom:15px; background:white;">
        <h3 id="modal-title" style="margin:0;">Lagu Sedang Dimuat...</h3>
        <p id="modal-artist" style="margin:5px 0; opacity:0.8;">Mohon tunggu</p>
        <button onclick="document.getElementById('metadata-modal').style.display='none'" style="margin-top:15px; padding:10px 20px; cursor:pointer; border-radius:10px; border:none; background:var(--accent); color:white;">Tutup</button>
    </div>
</div>

<div class="player-view" id="player-screen">
    <div class="player-card">
        <img class="player-img" id="p-img" src="" alt="Close Player" onclick="closePlayer()">
        <div class="player-title" id="p-title">Nama Radio</div>
        <div class="player-sub" id="p-sub">Lokasi</div>
        
        <div class="volume-container">
            <svg width="18" height="18" viewBox="0 0 24 24" class="svg-muted"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM4 9v6h4l5 5V4L8 9H4z"/></svg>
            <input type="range" class="volume-slider" id="v-control" min="0" max="100" step="1" value="100">
        </div>

        <div class="player-controls">
            <button class="icon-btn" onclick="closePlayer()">
                <svg width="22" height="22" viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            </button>
            
            <button class="play-master-btn" id="play-master-btn" onclick="togglePlay(event)">❚❚</button>
            
            <button class="icon-btn" onclick="openMetadata()">
                <svg width="22" height="22" viewBox="0 0 24 24" class="svg-muted"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </button>
        </div>
    </div>
</div>

<audio id="live-audio" preload="none"></audio>

<script>
    const audio = document.getElementById('live-audio');
    const playBtn = document.getElementById('play-master-btn');
    const miniPlayBtn = document.getElementById('mini-playpause-btn');
    const volumeSlider = document.getElementById('v-control');

    const unicodePlay = "▶";
    const unicodePause = "❚❚";

    let isPlaying = true; 
    let isStationLoaded = false;
    let currentStationId = ""; // VAR PENTING: Untuk tracking ID stasiun

    // FUNGSI METADATA (STEP 1)
        async function openMetadata() {
            const modal = document.getElementById('metadata-modal');
            modal.style.display = 'flex';
    
            // Tampilkan loading
            document.getElementById('modal-title').textContent = "Mengambil data...";
            document.getElementById('modal-artist').textContent = "Mohon tunggu...";

            try {
                // Panggil Worker kita
                const response = await fetch(`${WORKER_URL}?id=${currentStationId}`);
                const data = await response.json();

                // Update Modal dengan data dari Worker
                document.getElementById('modal-title').textContent = data.title;
                document.getElementById('modal-artist').textContent = data.artist;
                document.getElementById('modal-cover').src = data.cover;
        
            } catch (err) {
                document.getElementById('modal-title').textContent = "Gagal memuat";
                document.getElementById('modal-artist').textContent = "Periksa koneksi Worker Anda";
                console.error("Error fetching metadata:", err);
            }
        }
    }

    // FUNGSI LOCK SCREEN
    function updateLockScreen(name, logo) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: name,
                artist: 'RadStream',
                artwork: [{ src: logo, sizes: '512x512', type: 'image/png' }]
            });

            navigator.mediaSession.setActionHandler('play', () => { if (!isPlaying) togglePlay(); });
            navigator.mediaSession.setActionHandler('pause', () => { if (isPlaying) togglePlay(); });
        }
    }

    function updateSliderBackground(value) {
        volumeSlider.style.background = `linear-gradient(to right, var(--text-main) 0%, var(--text-main) ${value}%, #475569 ${value}%, #475569 100%)`;
    }

    updateSliderBackground(100);

    volumeSlider.addEventListener('input', function() {
        const value = this.value;
        updateSliderBackground(value);
        audio.volume = value / 100;
    });

    function renderPlayerUI() {
        if (isPlaying) {
            playBtn.textContent = unicodePause;
            playBtn.style.paddingLeft = "0px";
            miniPlayBtn.textContent = unicodePause;
        } else {
            playBtn.textContent = unicodePlay;
            playBtn.style.paddingLeft = "4px";
            miniPlayBtn.textContent = unicodePlay;
        }
    }

    fetch('indonesia.json')
        .then(res => res.json())
        .then(data => {
            const listWadah = document.getElementById('list-wadah');
            listWadah.innerHTML = '';
            
            data.forEach(radio => {
                // Di sini kita kirim radio.id ke fungsi openPlayer
                listWadah.innerHTML += `
                    <div class="station-item" onclick="openPlayer('${radio.id}', '${radio.name}', '${radio.city}, ${radio.province}', '${radio.logo}', '${radio.stream_url}')">
                        <img class="station-img" src="${radio.logo}">
                        <div class="station-info">
                            <div class="station-name">${radio.name}</div>
                            <div class="station-meta">${radio.city}, Indonesia</div>
                            <div class="station-meta" style="color: #3b82f6; font-weight: 500; margin-top:2px;">${radio.fm_frequency}</div>
                        </div>
                    </div>
                `;
            });
        }).catch(err => console.error("Gagal memuat daftar stasiun:", err));

    function openPlayer(id, name, loc, logo, url) {
        isStationLoaded = true;
        currentStationId = id; // Menyimpan ID saat stasiun dipilih

        document.getElementById('p-title').textContent = name;
        document.getElementById('p-sub').textContent = loc;
        document.getElementById('p-img').src = logo;
        
        document.getElementById('mini-station-name').textContent = name;
        document.getElementById('mini-logo').src = logo;
        
        updateLockScreen(name, logo);
        
        document.getElementById('mini-player').classList.remove('hidden');
        document.getElementById('player-screen').style.display = 'flex';
        document.body.classList.add('player-active');
        
        if (audio.src !== url) {
            audio.src = url;
        }
        
        isPlaying = true;
        renderPlayerUI();
        
        audio.play().catch(err => {
            console.log("Autoplay diblokir browser");
            isPlaying = false;
            renderPlayerUI();
        });
    }

    function closePlayer() {
        document.getElementById('player-screen').style.display = 'none';
        document.body.classList.remove('player-active'); 
        
        if (isStationLoaded) {
            document.getElementById('mini-player').classList.remove('hidden');
        }
    }

    function openFullPlayerFromMini() {
        document.getElementById('mini-player').classList.add('hidden');
        document.getElementById('player-screen').style.display = 'flex';
        document.body.classList.add('player-active');
    }

    function togglePlay(event) {
        if (event) event.stopPropagation();

        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            renderPlayerUI();
        } else {
            isPlaying = true;
            renderPlayerUI();
            audio.play().catch(err => {
                isPlaying = false;
                renderPlayerUI();
            });
        }
    }
</script>

</body>
</html>

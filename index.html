<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RadStream</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.8/hls.min.js"></script>
    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }
        
        html, body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }
        
        body.player-active {
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .phone-container { 
            width: 100%; 
            max-width: 390px; 
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            padding: 20px;
            box-sizing: border-box;
        }

        .header-title { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 10px 0 20px 0; 
            letter-spacing: -0.5px; 
        }
        
        .station-list-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 140px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .station-list-container::-webkit-scrollbar {
            display: none;
        }

        .station-list-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 5px 0; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }

        .station-item { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #2d3748; 
        }

        .station-item:last-child { border-bottom: none; }
        
        .station-img { 
            width: 55px; 
            height: 55px; 
            border-radius: 12px; 
            object-fit: cover; 
            background: transparent; 
            padding: 4px; 
            box-sizing: border-box;
        }

        .station-info { margin-left: 15px; flex: 1; overflow: hidden; }
        .station-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-meta { font-size: 13px; color: var(--text-muted); }

        #mini-player {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            box-sizing: border-box;
            z-index: 80;
            transition: transform 0.3s ease, opacity 0.3s ease;
            border: 1px solid #2d3748;
        }

        #mini-player.hidden {
            transform: translate(-50%, 150%);
            opacity: 0;
            pointer-events: none;
        }

        #mini-player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            cursor: pointer;
            overflow: hidden;
        }

        #mini-logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            object-fit: cover;
            background: transparent;
            padding: 3px;
            box-sizing: border-box;
        }

        .mini-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #mini-station-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-subtitle {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
        }

        #mini-playpause-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-nav { 
            position: fixed; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 100%; 
            max-width: 390px; 
            background: var(--bg-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box; 
            border-top: 1px solid #1e293b; 
            z-index: 90; 
        }

        .footer-text { font-size: 15px; font-weight: 500; color: var(--text-muted); }
        .icon-btn { background: none; border: none; padding: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .player-view { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: var(--bg-color); 
            z-index: 100; 
            padding: 25px; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        .player-card { 
            background: var(--card-bg); 
            border-radius: 24px; 
            width: 100%; 
            max-width: 340px; 
            padding: 25px; 
            box-sizing: border-box; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            text-align: left;
        }

        .view-content {
            display: block;
            text-align: left;
        }

        .player-img {  
            width: calc(100% - 0px); 
            margin: 0 auto 25px auto; 
            display: block;           
            aspect-ratio: 1;
            border-radius: 16px;      
            object-fit: cover;  
            background: transparent;  
            box-sizing: border-box;  
            cursor: pointer;  
        }
        
        .player-title { 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 4px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .player-sub { 
            font-size: 14px; 
            color: var(--text-muted); 
            margin-bottom: 25px;
        }
        
        .volume-container { display: flex; align-items: center; gap: 12px; width: 100%; margin-bottom: 35px; }
        .volume-slider { 
            flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none;
            background: linear-gradient(to right, var(--text-main) 0%, var(--text-main) 100%, #475569 100%, #475569 100%);
        }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text-main); cursor: pointer; border: none; }
        
        .player-controls { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .play-master-btn { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            border: 2.5px solid var(--text-main); 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            background: transparent; 
            transition: transform 0.1s;
            color: var(--text-main);
            font-size: 24px; 
            line-height: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .play-master-btn:active { transform: scale(0.95); }
        
        svg { fill: currentColor; color: var(--text-main); }
        .svg-muted { color: var(--text-muted); }
        .svg-active { color: var(--text-main) !important; }

        #view-metadata { display: none; }
        .view-meta-active #view-station { display: none; }
        .view-meta-active #view-metadata { display: block; }
    </style>
</head>
<body>

<div class="phone-container" id="main-view">
    <div class="header-title">Indonesia Station</div>
    
    <div class="station-list-container">
        <div class="station-list-card" id="list-wadah"></div>
    </div>

    <div id="mini-player" class="hidden">
        <div id="mini-player-info" onclick="openFullPlayerFromMini()">
            <img id="mini-logo" src="" alt="Logo Station">
            <div class="mini-text">
                <span id="mini-station-name">Nama Stasiun</span>
                <span class="mini-subtitle">Sedang diputar</span>
            </div>
        </div>
        <button id="mini-playpause-btn" onclick="togglePlay(event)">❚❚</button>
    </div>

    <div class="footer-nav">
        <span class="footer-text">Indonesia Station</span>
        <button class="icon-btn" onclick="alert('Fitur Cari akan aktif di Step berikutnya!')">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
    </div>
</div>

<div class="player-view" id="player-screen">
    <div class="player-card" id="main-player-card">
        <div id="view-station" class="view-content">
            <img class="player-img" id="p-img" src="" alt="Close Player" onclick="closePlayer()">
            <div class="player-title" id="p-title">Nama Radio</div>
            <div class="player-sub" id="p-sub">Lokasi</div>
        </div>

        <div id="view-metadata" class="view-content">
            <img class="player-img" id="meta-img" src="" alt="Metadata Cover" onclick="toggleMetadataView()">
            <div class="player-title" id="meta-title">Lagu</div>
            <div class="player-sub" id="meta-artist">Artis</div>
        </div>
        
        <div class="volume-container">
            <svg width="18" height="18" viewBox="0 0 24 24" class="svg-muted"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM4 9v6h4l5 5V4L8 9H4z"/></svg>
            <input type="range" class="volume-slider" id="v-control" min="0" max="100" step="1" value="100">
        </div>

        <div class="player-controls">
            <button class="icon-btn" onclick="closePlayer()">
                <svg width="22" height="22" viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            </button>
            
            <button class="play-master-btn" id="play-master-btn" onclick="togglePlay(event)">❚❚</button>
            
            <button class="icon-btn" id="music-btn" onclick="toggleMetadataView()">
                <svg width="22" height="22" viewBox="0 0 24 24" class="svg-muted"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </button>
        </div>
    </div>
</div>

<audio id="live-audio" preload="none"></audio>

<script>
const WORKER_URL = "https://radstream-api.fadjark-ur.workers.dev"; 
let audio = null; 
let hlsInstance = null; // <--- Tambahkan ini

const playBtn = document.getElementById('play-master-btn');
const miniPlayBtn = document.getElementById('mini-playpause-btn');
const volumeSlider = document.getElementById('v-control');
const playerCard = document.getElementById('main-player-card');
const musicBtn = document.getElementById('music-btn');

const unicodePlay = "▶";
const unicodePause = "❚❚";

let isPlaying = false; 
let isStationLoaded = false;
let currentStationId = ""; 
let currentStationUrl = ""; 
let isMetadataView = false;

let currentApiUrl = "";
let currentApiType = "";
let metadataPoller = null;
let stallTimeout = null;

function initAudioElement(url) {
    // 1. Hancurkan instance HLS lama jika ada
    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }

    if (audio) {
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
        audio = null;
    }

    audio = new Audio();
    audio.preload = "none"; 
    audio.volume = volumeSlider.value / 100;

    // --- STATE GUARD (Tetap sama seperti racikan anti-ghosting kita) ---
    audio.addEventListener('play', () => {
        if (!isPlaying) { audio.pause(); return; }
        renderPlayerUI();
        if (isMetadataView && !metadataPoller) {
            metadataPoller = setInterval(requestMetadataUpdate, 15000);
        }
    });

    audio.addEventListener('playing', () => {
        if (!isPlaying) { audio.pause(); return; }
        renderPlayerUI();
        clearTimeout(stallTimeout);
    });

    audio.addEventListener('pause', () => {
        if (isPlaying) {
            isPlaying = false;
            renderPlayerUI();
            if (metadataPoller) { clearInterval(metadataPoller); metadataPoller = null; }
        }
    });

    audio.addEventListener('waiting', () => {
        if (!isPlaying) return;
        clearTimeout(stallTimeout);
        stallTimeout = setTimeout(() => {
            console.log("Mendeteksi lag, menyinkronkan ulang...");
            if (audio && isPlaying && currentStationUrl) {
                initAudioElement(currentStationUrl);
                audio.play().catch(() => {});
            }
        }, 2000); 
    });

    audio.addEventListener('error', () => {
        if (isPlaying && audio && currentStationUrl) {
            setTimeout(() => {
                if (audio && isPlaying) {
                    initAudioElement(currentStationUrl);
                    audio.play().catch(() => {});
                }
            }, 1000);
        }
    });

    audio.addEventListener('emptied', () => { if (!isPlaying) renderPlayerUI(); });
    audio.addEventListener('abort', () => { if (!isPlaying) renderPlayerUI(); });

    // --- ENGINE ROUTING (Jalur Pemisahan HLS vs Standar) ---
    if (url.includes('.m3u8')) || url.includes('revma.com')) {
        if (Hls.isSupported()) {
            hlsInstance = new Hls({
                liveDurationInfinity: true,
                manifestLoadingMaxRetry: 3,
                maxBufferLength: 6 // Jaga buffer tipis agar selalu real-time live
            });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(audio);
            
            // Penanganan error khusus mesin HLS
            hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal && isPlaying) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        hlsInstance.startLoad();
                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        hlsInstance.recoverMediaError();
                    } else {
                        initAudioElement(url);
                        audio.play().catch(() => {});
                    }
                }
            });
        } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
            // Jalur khusus Safari iOS (iPhone) karena mendukung HLS secara bawaan
            audio.src = url;
        } else {
            alert("Browser tidak mendukung pemutaran format HLS.");
        }
    } else {
        // Jalur untuk format MP3 / AAC / Icecast standar
        audio.src = url;
    }
}
function renderPlayerUI() {
    if (isPlaying) {
        playBtn.textContent = unicodePause;
        playBtn.style.paddingLeft = "0px";
        miniPlayBtn.textContent = unicodePause;
    } else {
        playBtn.textContent = unicodePlay;
        playBtn.style.paddingLeft = "4px";
        miniPlayBtn.textContent = unicodePlay;
    }
}

volumeSlider.addEventListener('input', function() {
    const value = this.value;
    updateSliderBackground(value);
    if (audio) audio.volume = value / 100;
});

function updateSliderBackground(value) {
    volumeSlider.style.background = `linear-gradient(to right, var(--text-main) 0%, var(--text-main) ${value}%, #475569 ${value}%, #475569 100%)`;
}
updateSliderBackground(100);

function openPlayer(id, name, loc, logo, url, apiUrl = '', apiType = 'fallback') {
    isStationLoaded = true;
    currentStationId = id; 
    currentStationUrl = url; 
    
    currentApiUrl = apiUrl;
    currentApiType = apiType;
    
    isMetadataView = false;
    clearInterval(metadataPoller);
    metadataPoller = null;
    playerCard.classList.remove('view-meta-active');
    musicBtn.querySelector('svg').classList.remove('svg-active');

    document.getElementById('p-title').textContent = name;
    document.getElementById('p-sub').textContent = loc;
    document.getElementById('p-img').src = logo;
    
    document.getElementById('mini-station-name').textContent = name;
    document.getElementById('mini-logo').src = logo;
    
    updateLockScreen(name, logo);
    
    document.getElementById('mini-player').classList.remove('hidden');
    document.getElementById('player-screen').style.display = 'flex';
    document.body.classList.add('player-active');
    
    // Set state bermain sebelum audio berjalan agar UI langsung terkunci aman
    isPlaying = true;
    renderPlayerUI();
    
    initAudioElement(url);
    audio.play().catch(err => {
        console.log("Menunggu sinkronisasi awal stream...");
    });
}

function togglePlay(event) {
    if (event) event.stopPropagation();
    if (!audio) return;

    if (isPlaying) {
        // Matikan state & amankan UI
        isPlaying = false;
        renderPlayerUI();
        
        clearTimeout(stallTimeout);
        if (metadataPoller) {
            clearInterval(metadataPoller);
            metadataPoller = null;
        }

        // Hancurkan koneksi audio & engine HLS
        try {
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            audio.pause();
            audio.removeAttribute('src');
            audio.load();
        } catch (e) {
            console.log("Audio dismantled.");
        }
    } else {
        // Putar kembali stream dengan memanggil ulang engine agar fresh
        isPlaying = true;
        renderPlayerUI();
        
        initAudioElement(currentStationUrl);
        audio.play().catch(err => {
            console.log("Playback failed to resume:", err.message);
        });
    }
}
function closePlayer() {
    document.getElementById('player-screen').style.display = 'none';
    document.body.classList.remove('player-active'); 
    if (isStationLoaded) {
        document.getElementById('mini-player').classList.remove('hidden');
    }
}

function openFullPlayerFromMini() {
    document.getElementById('mini-player').classList.add('hidden');
    document.getElementById('player-screen').style.display = 'flex';
    document.body.classList.add('player-active');
}

function updateLockScreen(title, logo, artist = 'RadStream', album = 'RadStream') {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: title,
            artist: artist,
            album: album,
            artwork: [{ src: logo, sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', () => { togglePlay(); });
        navigator.mediaSession.setActionHandler('pause', () => { togglePlay(); });
    }
}

// RENDER ENGINE
fetch('indonesia.json')
    .then(res => res.json())
    .then(data => {
        const listWadah = document.getElementById('list-wadah');
        listWadah.innerHTML = '';
        data.forEach(radio => {
            const apiType = radio.api_type || 'fallback';
            const apiUrl = radio.api_url || '';
            const country = radio.country || 'Indonesia';
            
            listWadah.innerHTML += `
                <div class="station-item" onclick="openPlayer('${radio.id}', '${radio.name}', '${radio.city}, ${country}', '${radio.logo}', '${radio.stream_url}', '${apiUrl}', '${apiType}')">
                    <img class="station-img" src="${radio.logo}">
                    <div class="station-info">
                        <div class="station-name">${radio.name}</div>
                        <div class="station-meta">${radio.city}, ${country}</div>
                        <div class="station-meta" style="color: #3b82f6; font-weight: 500; margin-top:2px;">${radio.fm_frequency}</div>
                    </div>
                </div>
            `;
        });
    });

async function requestMetadataUpdate() {
    if (!currentApiUrl || currentApiUrl.trim() === "" || currentApiType === "fallback" || !isPlaying) {
        resetMetadataToDefault();
        return;
    }
    try {
        const response = await fetch(`${WORKER_URL}/?api_url=${encodeURIComponent(currentApiUrl)}&api_type=${currentApiType}&_t=${Date.now()}`);
        const data = await response.json();
        if (!data || data.title === "Live Streaming" || data.title === "Station Offline") {
            resetMetadataToDefault();
            return;
        }
        document.getElementById('meta-title').textContent = data.title;
        document.getElementById('meta-artist').textContent = data.artist;
        
        const metaImg = document.getElementById('meta-img');
        const finalCover = (data.cover && data.cover.trim() !== "") ? data.cover : document.getElementById('p-img').src;
        metaImg.src = finalCover;
        metaImg.style.display = 'block';

        updateLockScreen(data.title, finalCover, data.artist, document.getElementById('p-title').textContent);
    } catch (err) {
        resetMetadataToDefault();
    }
}

function resetMetadataToDefault() {
    const metaImg = document.getElementById('meta-img');
    const radioName = document.getElementById('p-title').textContent;
    const radioLogo = document.getElementById('p-img').src;

    document.getElementById('meta-title').textContent = radioName; 
    document.getElementById('meta-artist').textContent = "Sedang Mengudara Live"; 
    metaImg.src = radioLogo; 
    metaImg.style.display = 'block';

    if (isStationLoaded) {
        updateLockScreen(radioName, radioLogo, 'RadStream', 'Live Stream');
    }
}

async function toggleMetadataView() {
    if (!isMetadataView) {
        document.getElementById('meta-title').textContent = "Mengambil data...";
        document.getElementById('meta-artist').textContent = "Mohon tunggu...";
        playerCard.classList.add('view-meta-active');
        musicBtn.querySelector('svg').classList.add('svg-active');
        isMetadataView = true;
        await requestMetadataUpdate();
        
        clearInterval(metadataPoller);
        if (isPlaying) { 
            metadataPoller = setInterval(requestMetadataUpdate, 15000);
        }
    } else {
        playerCard.classList.remove('view-meta-active');
        musicBtn.querySelector('svg').classList.remove('svg-active');
        isMetadataView = false;
        clearInterval(metadataPoller);
        metadataPoller = null;
        
        const radioName = document.getElementById('p-title').textContent;
        const radioLogo = document.getElementById('p-img').src;
        updateLockScreen(radioName, radioLogo);
    }
}
</script>

</body>
</html>

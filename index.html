<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadStream</title>
    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #22385c;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .phone-container { width: 100%; max-width: 390px; min-height: 800px; display: flex; flex-direction: column; position: relative; }
        
        /* === HALAMAN DAFTAR (2.png) === */
        .header-title { font-size: 24px; font-weight: bold; margin: 20px 0; }
        .station-list-card { background: var(--card-bg); border-radius: 20px; padding: 10px 0; display: flex; flex-direction: column; }
        .station-item { display: flex; align-items: center; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #2e4a77; }
        .station-item:last-child { border-bottom: none; }
        .station-img { width: 60px; height: 60px; border-radius: 12px; object-fit: contain; background: white; padding: 5px; }
        .station-info { margin-left: 15px; flex: 1; }
        .station-name { font-size: 18px; font-weight: bold; margin-bottom: 3px; }
        .station-meta { font-size: 13px; color: var(--text-muted); }
        
        /* === FOOTER NAVIGATION === */
        .footer-nav { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding: 20px 10px; font-size: 16px; color: var(--text-muted); }
        .search-icon { font-size: 20px; cursor: pointer; color: var(--text-main); }

        /* === HALAMAN PLAYER FULLSCREEN (1.png) === */
        .player-view { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: var(--bg-color); z-index: 100; padding: 30px; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .player-card { background: var(--card-bg); border-radius: 24px; width: 100%; max-width: 340px; padding: 25px; box-sizing: border-box; text-align: left; }
        .player-img { width: 100%; aspect-ratio: 1; border-radius: 16px; object-fit: contain; background: white; padding: 15px; box-sizing: border-box; margin-bottom: 25px; }
        .player-title { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .player-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
        
        /* Volume Bar */
        .volume-container { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 30px; }
        .volume-bar { flex: 1; height: 4px; background: #475569; border-radius: 2px; position: relative; }
        .volume-progress { width: 40%; height: 100%; background: var(--text-muted); border-radius: 2px; }
        .volume-dot { width: 12px; height: 12px; background: var(--text-main); border-radius: 50%; position: absolute; left: 40%; top: -4px; }

        /* Controls */
        .player-controls { display: flex; justify-content: space-around; align-items: center; width: 100%; padding: 0 10px; }
        .control-icon { font-size: 22px; color: var(--text-main); cursor: pointer; opacity: 0.8; }
        .play-master-btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--text-main); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: var(--text-main); background: transparent; }
    </style>
</head>
<body>

<div class="phone-container" id="main-view">
    <div class="header-title" id="region-title">Indonesia Station</div>
    
    <!-- Wadah Daftar Sesuai Gambar 2.png -->
    <div class="station-list-card" id="list-wadah"></div>

    <div class="footer-nav">
        <span id="nav-text">Indonesia Station</span>
        <span class="search-icon">🔍</span>
    </div>
</div>

<!-- Tampilan Player Sesuai Gambar 1.png -->
<div class="player-view" id="player-screen">
    <div class="player-card">
        <!-- Klik gambar untuk kembali ke daftar -->
        <img class="player-img" id="p-img" src="" alt="" onclick="closePlayer()">
        <div class="player-title" id="p-title">Nama Radio</div>
        <div class="player-sub" id="p-sub">Lokasi</div>
        
        <div class="volume-container">
            <span>🔊</span>
            <div class="volume-bar"><div class="volume-progress"></div><div class="volume-dot"></div></div>
        </div>

        <div class="player-controls">
            <span class="control-icon" onclick="closePlayer()">📋</span>
            <button class="play-master-btn" id="master-play-btn" onclick="togglePlay()">▶</button>
            <span class="control-icon">🎵</span>
        </div>
    </div>
</div>

<audio id="live-audio"></audio>

<script>
    const audio = document.getElementById('live-audio');
    let currentStationUrl = "";

    // Load data JSON
    fetch('indonesia.json')
        .then(res => res.json())
        .then(data => {
            const listWadah = document.getElementById('list-wadah');
            listWadah.innerHTML = '';
            
            data.forEach(radio => {
                listWadah.innerHTML += `
                    <div class="station-item" onclick="openPlayer('${radio.name}', '${radio.city}, ${radio.province}', '${radio.logo}', '${radio.stream_url}')">
                        <img class="station-img" src="${radio.logo}">
                        <div class="station-info">
                            <div class="station-name">${radio.name}</div>
                            <div class="station-meta">${radio.city}, Indonesia</div>
                            <div class="station-meta" style="color: #3b82f6; font-weight: 500; margin-top:2px;">${radio.fm_frequency || '96.9 FM'}</div>
                        </div>
                    </div>
                `;
            });
        });

    function openPlayer(name, loc, logo, url) {
        document.getElementById('p-title').textContent = name;
        document.getElementById('p-sub').textContent = loc;
        document.getElementById('p-img').src = logo;
        document.getElementById('player-screen').style.display = 'flex';
        
        if(audio.src !== url) {
            audio.src = url;
            currentStationUrl = url;
        }
        audio.play();
        document.getElementById('master-play-btn').innerHTML = '⏸';
    }

    function closePlayer() {
        document.getElementById('player-screen').style.display = 'none';
    }

    function togglePlay() {
        const btn = document.getElementById('master-play-btn');
        if (audio.paused) {
            audio.play();
            btn.innerHTML = '⏸';
        } else {
            audio.pause();
            btn.innerHTML = '▶';
        }
    }
</script>

</body>
</html>
